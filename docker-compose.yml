services:
  backend:
    image: aajaas/ledger-lever-backend:latest
    container_name: ledger-lever-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/portfolio.db
    volumes:
      - portfolio_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ledger-net

  frontend:
    image: aajaas/ledger-lever-frontend:latest
    container_name: ledger-lever-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ledger-net

volumes:
  portfolio_data:
    driver: local

networks:
  ledger-net:
    driver: bridge
