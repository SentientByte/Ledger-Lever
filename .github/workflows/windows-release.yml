name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer (Tauri)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust toolchain ──────────────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Node / frontend ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Note: app icons are pre-rendered and committed under src-tauri/icons.
      # See src-tauri/icons/README.md to regenerate them from app-icon.svg.

      # ── Determine release tag ───────────────────────────────────────────────
      - name: Determine tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # ── Build & bundle with Tauri ───────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "Ledger Lever ${{ steps.tag.outputs.name }}"
          releaseBody: |
            ## Ledger Lever ${{ steps.tag.outputs.name }}

            ### What's new
            - Native Windows desktop app — no Docker, no Python, no browser tab required.
            - Fully self-contained: Rust backend + React UI bundled in a single installer.
            - Portfolio data stored in `%APPDATA%\com.ledgerlever.app\portfolio.db`.

            ### Installation
            1. Download **Ledger Lever_${{ steps.tag.outputs.name }}_x64-setup.exe** or the `.msi` below.
            2. Run the installer and follow the prompts.
            3. Launch **Ledger Lever** from the desktop shortcut or Start Menu.

            ### Notes
            - Requires Windows 10 or later (64-bit).
            - Internet access is needed for live prices from Yahoo Finance.
            - Prices auto-refresh every 5 minutes in the background.
          releaseDraft: false
          prerelease: false
          projectPath: src-tauri
          tauriScript: npx @tauri-apps/cli@latest
