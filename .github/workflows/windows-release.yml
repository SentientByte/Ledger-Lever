name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)"
        required: true
        default: "v0.1.1"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend build ──────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE: ""   # API calls go to same origin in standalone mode

      # ── Python / PyInstaller build ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        run: pyinstaller ledger_lever.spec --clean --noconfirm

      # ── Installer (Inno Setup) ──────────────────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc installer.iss

      # ── Create GitHub Release ───────────────────────────────────────────────
      - name: Determine tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Ledger Lever ${{ steps.tag.outputs.name }}"
          body: |
            ## Ledger Lever ${{ steps.tag.outputs.name }}

            ### What's new
            - Windows desktop release: self-contained `.exe` installer, no Docker or Python required.
            - Single installer places a desktop shortcut and Start Menu entry.
            - Portfolio data stored in `%USERPROFILE%\LedgerLever\portfolio.db`.

            ### Installation
            1. Download **LedgerLever-Setup-v0.1.1.exe** below.
            2. Run the installer and follow the prompts.
            3. Launch **Ledger Lever** from the desktop shortcut — a browser tab opens automatically at `http://localhost:8000`.

            ### Notes
            - Requires Windows 10 or later (64-bit).
            - Internet access is needed to fetch live prices from Yahoo Finance.
            - To uninstall, use *Add or Remove Programs*.
          draft: false
          prerelease: false
          files: |
            Output/LedgerLever-Setup-v0.1.1.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
